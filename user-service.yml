server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/streaming_users
    username: streaming
    password: streaming123

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    # Forces Flyway to validate that your database matches your migration files on boot
    validate-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
